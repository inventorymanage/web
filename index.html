<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1, h2, h3 { color: #e0e0e0; }
        .login-split, .grid {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #45a049; }
        .logout-btn {
            width: auto;
            background-color: #e74c3c;
            float: right;
        }
        .logout-btn:hover { background-color: #c0392b; }
        .edit-btn {
            background-color: #f39c12;
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
        }
        .warning-box {
            background-color: #ffcccc;
            color: #cc0000;
            border: 2px solid #cc0000;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background-color: #34495e;
        }
        th, td {
            padding: 12px;
            border: 1px solid #2c3e50;
            text-align: left;
        }
        th { background-color: #1abc9c; }
    </style>
</head>
<body>

<div id="login-screen" class="container">
    <h1>System Login</h1>
    <div class="login-split">

        <div class="card">
            <h2>Employee Login</h2>
            <input type="email" id="emp-email" placeholder="Email (employee@gmail.com)">
            <input type="password" id="emp-password" placeholder="Password (202003)">
            <button onclick="login('employee')">Login as Employee</button>
        </div>

        <div class="card">
            <h2>Admin Login</h2>
            <input type="email" id="admin-email" placeholder="Email (admin@gmail.com)">
            <input type="password" id="admin-password" placeholder="Password (261999)">
            <button onclick="login('admin')">Login as Admin</button>
        </div>

    </div>
    <p id="login-error" style="color: #ff6b6b; display: none; font-weight: bold;">Incorrect Email or Password!</p>
</div>

<div id="admin-dashboard" class="container" style="display: none;">
    <button class="logout-btn" onclick="logout()">Logout</button>
    <h1>Admin Dashboard</h1>

    <div id="low-stock-warning" class="warning-box" style="display: none;"></div>

    <div class="grid">
        <div class="card">
            <h2>Record New Inventory</h2>
            <input type="text" id="inv-product" placeholder="Product Name">
            <input type="number" id="inv-qty" placeholder="Quantity">
            <input type="number" id="inv-price" placeholder="Total Amount/Price ($)">
            <button onclick="addInventory()">Add to Records</button>
        </div>

        <div class="card">
            <h2>Assign Item Out</h2>
            <input type="text" id="assign-emp" placeholder="Employee Receiving Item">
            <input type="text" id="assign-product" placeholder="Product Name">
            <input type="number" id="assign-qty" placeholder="Quantity to Give">
            <button onclick="assignItem()">Record Assignment</button>
        </div>
    </div>

    <div class="history-section">
        <h2>Master Inventory List</h2>
        <table id="admin-inventory-table">
        </table>

        <h2>Assignment History (Outgoing)</h2>
        <table id="admin-assign-table">
        </table>
    </div>
</div>

<div id="employee-dashboard" class="container" style="display: none;">
    <button class="logout-btn" onclick="logout()">Logout</button>
    <h1>Employee Dashboard</h1>
    <p>View-only access to current system records.</p>

    <div class="history-section">
        <h2>Current Inventory Status</h2>
        <table id="employee-inventory-table">
        </table>

        <h2>Assignment Records</h2>
        <table id="employee-assign-table">
        </table>
    </div>
</div>

<script>
    // Data Storage Arrays
    let inventory = []; // Array of objects: { name, qty, price }
    let assignments = []; // Array of objects: { empName, product, qty }

    // --- LOGIN LOGIC ---
    function login(role) {
        const errorMsg = document.getElementById('login-error');
        errorMsg.style.display = 'none';

        if (role === 'admin') {
            const email = document.getElementById('admin-email').value.trim();
            const pass = document.getElementById('admin-password').value.trim();

            if (email === 'admin@gmail.com' && pass === '261999') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
                updateAdminUI();
            } else {
                errorMsg.style.display = 'block';
            }
        } else if (role === 'employee') {
            const email = document.getElementById('emp-email').value.trim();
            const pass = document.getElementById('emp-password').value.trim();

            if (email === 'employee@gmail.com' && pass === '202003') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('employee-dashboard').style.display = 'block';
                updateEmployeeUI();
            } else {
                errorMsg.style.display = 'block';
            }
        }
    }

    function logout() {
        // Clear passwords
        document.getElementById('admin-password').value = '';
        document.getElementById('emp-password').value = '';

        // Hide dashboards, show login
        document.getElementById('admin-dashboard').style.display = 'none';
        document.getElementById('employee-dashboard').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
    }

    // --- ADMIN FUNCTIONS (WRITE & EDIT) ---
    function addInventory() {
        const product = document.getElementById('inv-product').value.trim();
        const qty = parseInt(document.getElementById('inv-qty').value);
        const price = parseFloat(document.getElementById('inv-price').value);

        if (product && qty > 0 && price >= 0) {
            // Check if item already exists to update it, otherwise create new
            let existingItem = inventory.find(item => item.name.toLowerCase() === product.toLowerCase());
            if (existingItem) {
                existingItem.qty += qty;
                existingItem.price += price; // Add to total value
            } else {
                inventory.push({ name: product, qty: qty, price: price });
            }

            // Clear inputs
            document.getElementById('inv-product').value = '';
            document.getElementById('inv-qty').value = '';
            document.getElementById('inv-price').value = '';
            updateAdminUI();
        } else {
            alert("Please fill out Product Name, a valid Quantity, and Amount.");
        }
    }

    function assignItem() {
        const emp = document.getElementById('assign-emp').value.trim();
        const product = document.getElementById('assign-product').value.trim();
        const qty = parseInt(document.getElementById('assign-qty').value);

        if (emp && product && qty > 0) {
            let existingItem = inventory.find(item => item.name.toLowerCase() === product.toLowerCase());

            if (!existingItem || existingItem.qty < qty) {
                alert("Not enough stock in inventory to assign this amount!");
                return;
            }

            // Deduct from inventory and record assignment
            existingItem.qty -= qty;
            assignments.push({ empName: emp, product: existingItem.name, qty: qty });

            // Clear inputs
            document.getElementById('assign-emp').value = '';
            document.getElementById('assign-product').value = '';
            document.getElementById('assign-qty').value = '';
            updateAdminUI();
        } else {
            alert("Please fill out all assignment fields correctly.");
        }
    }

    function editInventory(index) {
        // Prompts the admin to type a new quantity
        let currentItem = inventory[index];
        let newQty = prompt(`Edit Quantity for ${currentItem.name}:`, currentItem.qty);

        // If they didn't hit cancel, update the array
        if (newQty !== null && newQty.trim() !== "" && !isNaN(newQty)) {
            inventory[index].qty = parseInt(newQty);
            updateAdminUI(); // Refresh the table
        }
    }

    // --- UI UPDATING LOGIC ---
    function updateAdminUI() {
        checkLowStock();

        // Build Admin Inventory Table (With Edit Buttons)
        const invTable = document.getElementById('admin-inventory-table');
        invTable.innerHTML = '<tr><th>Product Name</th><th>Stock Qty</th><th>Total Amount ($)</th><th>Actions</th></tr>';

        inventory.forEach((item, index) => {
            invTable.innerHTML += `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.qty}</td>
                    <td>$${item.price.toFixed(2)}</td>
                    <td><button class="edit-btn" onclick="editInventory(${index})">Edit Qty</button></td>
                </tr>`;
        });

        // Build Admin Assignments Table
        const assignTable = document.getElementById('admin-assign-table');
        assignTable.innerHTML = '<tr><th>Given To</th><th>Product</th><th>Quantity Out</th></tr>';
        assignments.forEach(a => {
            assignTable.innerHTML += `<tr><td>${a.empName}</td><td>${a.product}</td><td>${a.qty}</td></tr>`;
        });
    }

    function updateEmployeeUI() {
        // Build Employee Inventory Table (No Edit Buttons)
        const empInvTable = document.getElementById('employee-inventory-table');
        empInvTable.innerHTML = '<tr><th>Product Name</th><th>Stock Qty</th></tr>';
        inventory.forEach(item => {
            empInvTable.innerHTML += `<tr><td>${item.name}</td><td>${item.qty}</td></tr>`;
        });

        // Build Employee Assignments Table
        const empAssignTable = document.getElementById('employee-assign-table');
        empAssignTable.innerHTML = '<tr><th>Given To</th><th>Product</th><th>Quantity Out</th></tr>';
        assignments.forEach(a => {
            empAssignTable.innerHTML += `<tr><td>${a.empName}</td><td>${a.product}</td><td>${a.qty}</td></tr>`;
        });
    }

    function checkLowStock() {
        const warningBox = document.getElementById('low-stock-warning');
        let lowItems = [];

        inventory.forEach(item => {
            if (item.qty < 10) {
                lowItems.push(`${item.name} (Only ${item.qty} left)`);
            }
        });

        if (lowItems.length > 0) {
            warningBox.style.display = 'block';
            warningBox.innerHTML = `LOW STOCK ALERT: <br> ${lowItems.join('<br>')}`;
        } else {
            warningBox.style.display = 'none';
        }
    }
</script>
</body>
</html>
